<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ZiphyNet</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#080b14;--bg1:#0d1117;--bg2:#111827;--bg3:#1a2332;--bg4:#1f2d42;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.08);
  --g1:#7c3aed;--g2:#a855f7;--g3:#ec4899;
  --grad:linear-gradient(135deg,#7c3aed,#a855f7,#ec4899);
  --grad2:linear-gradient(135deg,#7c3aed 0%,#ec4899 100%);
  --accent:#a855f7;--accent2:#ec4899;--accent3:#06b6d4;
  --green:#10b981;--gold:#f59e0b;--red:#ef4444;
  --txt1:#f1f5f9;--txt2:#94a3b8;--txt3:#475569;
  --r:8px;--r-lg:12px;--r-xl:16px;--nav-h:60px;
  --font:'Inter',system-ui,sans-serif;--font-d:'Space Grotesk',sans-serif;
  --shadow:0 4px 24px rgba(0,0,0,.4);--shadow-lg:0 8px 40px rgba(0,0,0,.5);
  --glow:0 0 20px rgba(168,85,247,.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;color-scheme:dark}
body{background:var(--bg0);color:var(--txt1);font-family:var(--font);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:100vh;background:radial-gradient(ellipse at 20% 0%,rgba(124,58,237,.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 0%,rgba(236,72,153,.08) 0%,transparent 60%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:14px;color:var(--txt1)}
input,textarea,select{font-family:inherit;font-size:14px;color:var(--txt1)}
::selection{background:rgba(168,85,247,.3)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}
.nav{position:sticky;top:0;z-index:200;height:var(--nav-h);background:rgba(8,11,20,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}
.nav-logo{display:flex;align-items:center;gap:8px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:var(--font-d);font-size:1.3rem;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-logo svg{width:28px;height:28px;flex-shrink:0}
.nav-search{flex:1;max-width:520px;position:relative}
.nav-search input{width:100%;background:var(--glass);border:1px solid var(--border);border-radius:99px;padding:8px 16px 8px 40px;color:var(--txt1);transition:all .2s;font-size:13px}
.nav-search input::placeholder{color:var(--txt3)}
.nav-search input:focus{outline:none;border-color:var(--accent);background:var(--glass2);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.nav-auth{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.nav-user{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 6px;border:1px solid var(--border2);border-radius:99px;cursor:pointer;background:var(--glass);transition:all .15s;font-size:13px;font-weight:500}
.nav-user:hover{background:var(--glass2);border-color:var(--accent)}
.nav-icon-btn{position:relative;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--glass);border:1px solid var(--border);transition:all .15s}
.nav-icon-btn:hover{background:var(--glass2);border-color:var(--accent)}
.nav-badge{position:absolute;top:-3px;right:-3px;min-width:17px;height:17px;background:var(--red);color:#fff;border-radius:99px;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg1)}
.srch-dd{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);z-index:300;max-height:400px;overflow-y:auto;display:none}
.srch-dd.show{display:block}
.srch-sec{padding:8px 14px;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
.srch-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s}
.srch-item:hover{background:var(--glass2)}
.srch-title{font-size:13px;font-weight:600}.srch-sub{font-size:11px;color:var(--txt3)}
.page{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start}
.page.full{grid-template-columns:1fr;max-width:760px}
.page.wide{grid-template-columns:1fr;max-width:980px}
/* ═══════════════════════════════════════════════
   MOBILE RESPONSIVE — full overhaul
   ═══════════════════════════════════════════════ */

/* Base mobile tweaks (≤900px: hide sidebar) */
@media(max-width:900px){
  .page{grid-template-columns:1fr}
  .sidebar{display:none}
}

/* ── Tablet (≤768px) ── */
@media(max-width:768px){
  :root{ --nav-h:56px }

  /* NAV */
  .nav{ padding:0 14px; gap:10px }
  .nav-logo{ font-size:1.1rem }
  .nav-logo svg{ width:24px; height:24px }
  .nav-search{ max-width:none; flex:1 }
  .nav-search input{ font-size:12px; padding:7px 12px 7px 34px }
  .search-icon{ left:10px }
  /* Hide text labels on nav buttons */
  .nav-auth .btn-ghost.btn-sm:last-child{ display:none } /* hide sign out text */

  /* PAGE LAYOUT */
  .page{ padding:14px; gap:14px }
  .page.full{ padding:14px }
  .page.wide{ padding:14px }

  /* POST ROWS */
  .post-title{ font-size:14px }
  .post-actions{ gap:2px }
  .post-btn{ padding:4px 7px; font-size:11px }
  .ivbar{ padding:3px 8px }

  /* THREAD DETAIL */
  .detail-body{ font-size:14px; padding:12px }

  /* COMMENTS */
  .cmt-body{ font-size:13px }
  .cmt-acts{ gap:1px }
  .cmt-act{ padding:3px 6px; font-size:11px }

  /* CARDS */
  .card{ border-radius:var(--r-lg) }

  /* AUTH */
  .auth-card{ padding:20px }
  .auth-wrap{ padding:.75rem }

  /* PROFILE */
  .profile-banner{ height:90px }
  .profile-av{ width:70px; height:70px; top:-35px }
  .profile-av-edit{ top:-35px; left:62px }
  .profile-body{ padding-top:44px }

  /* ADMIN */
  .admin-wrap{ padding:14px }
  .admin-tabs{ gap:2px; padding:4px }
  .admin-tab{ padding:6px 12px; font-size:12px }
  .stat-grid{ grid-template-columns:1fr 1fr; gap:10px }
  .admin-table{ font-size:12px }
  .admin-table th,.admin-table td{ padding:8px 10px }

  /* CATEGORIES */
  .cat-grid{ grid-template-columns:1fr 1fr; gap:12px }

  /* DM PAGE */
  .dm-layout{ grid-template-columns:220px 1fr }
  .dm-item{ padding:10px 12px }
}

/* ── Mobile (≤600px) ── */
@media(max-width:600px){
  :root{ --nav-h:52px }

  /* NAV — compact */
  .nav{ padding:0 12px; gap:8px }
  .nav-logo span,.nav-logo-text{ display:none } /* hide "ZiphyNet" text, keep icon */
  .nav-search{ max-width:none }
  .nav-search input{ padding:6px 10px 6px 30px; font-size:12px }
  /* Shrink nav icon buttons */
  .nav-icon-btn{ width:32px; height:32px }
  .nav-auth .btn-outline{ padding:5px 10px; font-size:11px }
  .nav-auth .btn-grad{ padding:5px 10px; font-size:11px }
  .nav-user{ padding:4px 8px 4px 4px; font-size:12px }
  .nav-badge{ min-width:14px; height:14px; font-size:9px }

  /* HIDE sidebar always */
  .sidebar{ display:none !important }

  /* PAGE */
  .page,.page.full,.page.wide{
    padding:10px;
    grid-template-columns:1fr;
    gap:10px;
  }

  /* SORT BAR */
  .sort-bar{ padding:6px 10px; gap:2px; overflow-x:auto; flex-wrap:nowrap }
  .sort-btn{ padding:5px 10px; font-size:11px; white-space:nowrap }

  /* POST ROW */
  .post-row{ border-radius:var(--r-lg) }
  .post-body{ padding:10px 12px 8px }
  .post-title{ font-size:13px; line-height:1.4 }
  .post-meta{ font-size:11px; gap:4px }
  .post-cat{ font-size:10px; padding:2px 6px }
  .post-actions{ gap:1px; margin-top:8px }
  .post-btn{ padding:3px 6px; font-size:11px; gap:3px }
  .ivbar{ padding:3px 7px; gap:3px }
  .ivbtn{ width:20px; height:20px }
  .ivscore{ font-size:12px }

  /* POST MEDIA */
  .post-media{ max-height:220px }
  .post-media-sm{ max-height:180px }

  /* CREATE POST BOX */
  .card.row{ flex-wrap:wrap; padding:10px }

  /* THREAD DETAIL */
  .detail-body{ font-size:13px; padding:10px }

  /* COMMENTS */
  .comment{ margin-bottom:4px }
  .cmt-line{ margin:0 6px }
  .cmt-header{ gap:5px }
  .cmt-author{ font-size:11px }
  .cmt-time{ font-size:10px }
  .cmt-body{ font-size:13px; line-height:1.6 }
  .cmt-acts{ gap:0 }
  .cmt-act{ padding:3px 5px; font-size:10px }
  .reply-box textarea{ font-size:13px; min-height:70px; padding:10px 12px }
  .reply-box-foot{ padding:8px 10px }

  /* NEW POST FORM */
  .flair-picker{ gap:4px }
  .flair-opt{ padding:3px 8px; font-size:10px }
  .ptabs .ptab{ padding:8px 12px; font-size:12px }

  /* PROFILE */
  .profile-banner{ height:75px }
  .profile-av{ width:60px; height:60px; top:-30px; left:14px }
  .profile-av-edit{ top:-30px; left:56px; width:22px; height:22px; font-size:10px }
  .profile-body{ padding:36px 14px 14px }
  .stat-pill{ padding:6px 10px }
  .stat-num{ font-size:1rem }
  .stat-lbl{ font-size:9px }
  .ptab{ padding:8px 14px; font-size:12px }

  /* AUTH */
  .auth-box{ max-width:100% }
  .auth-card{ padding:18px; border-radius:var(--r-lg) }
  .auth-logo{ font-size:1.3rem; margin-bottom:16px }
  .code-inputs{ gap:6px }
  .code-input{ width:40px; height:48px; font-size:18px }

  /* ADMIN */
  .admin-wrap{ padding:10px }
  .admin-tabs{ overflow-x:auto; flex-wrap:nowrap; gap:0; padding:4px }
  .admin-tab{ padding:6px 10px; font-size:11px; white-space:nowrap }
  .stat-grid{ grid-template-columns:1fr 1fr; gap:8px }
  .stat-card{ padding:12px }
  .stat-card-num{ font-size:1.4rem }
  /* Stack admin dashboard grid */
  .admin-wrap > div > div[style*="grid-template-columns:1fr 1fr"]{ 
    display:flex; flex-direction:column; gap:12px 
  }
  .admin-table{ display:block; overflow-x:auto; -webkit-overflow-scrolling:touch }
  .reorder-item{ padding:10px }

  /* CATEGORIES */
  .cat-grid{ grid-template-columns:1fr; gap:10px }

  /* DM / MESSAGES — full mobile chat UI */
  .dm-layout{
    grid-template-columns:1fr;
    height:calc(100vh - var(--nav-h) - 65px);
    max-height:none;
    border-radius:var(--r-lg);
    overflow:hidden;
    border:1px solid var(--border);
  }
  .dm-sidebar{ border-right:none; display:flex; flex-direction:column }
  .dm-main{ display:none; height:100% }
  .dm-layout.chat-open .dm-sidebar{ display:none }
  .dm-layout.chat-open .dm-main{ display:flex; flex-direction:column }
  .dm-input-area{ padding:10px 12px }
  .dm-messages{ padding:14px 12px }
  .chat-msg{ max-width:82% }

  /* NOTIF DROPDOWN */
  .notif-dropdown{ 
    right:8px; left:8px; width:auto;
    max-height:70vh;
  }

  /* LINK PREVIEW */
  .lp-img{ max-height:180px }

  /* LIGHTBOX */
  .lightbox img{ max-width:96vw; max-height:80vh }

  /* SEARCH DROPDOWN */
  .srch-dd{ border-radius:var(--r-lg) }
  .srch-item{ padding:8px 12px }
}

/* ── Very small (≤380px) ── */
@media(max-width:380px){
  .nav-search{ display:none }
  .nav-search-btn{ display:flex !important }
  .post-btn span{ display:none }
  .code-input{ width:36px; height:44px; font-size:16px }
  .auth-card{ padding:14px }
}
/* Mobile search overlay */
.nav-search-btn{display:none;background:none;border:none;color:var(--txt2);width:34px;height:34px;border-radius:50%;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.nav-search-btn:hover{background:var(--glass2);color:var(--txt1)}
.mobile-search-overlay{display:none;position:fixed;top:0;left:0;right:0;z-index:500;background:var(--bg1);padding:10px 12px;border-bottom:1px solid var(--border);align-items:center;gap:8px}
.mobile-search-overlay.show{display:flex}
.mobile-search-overlay input{flex:1;background:var(--glass);border:1px solid var(--border2);border-radius:99px;padding:9px 16px;color:var(--txt1);font-size:14px;outline:none}
.mobile-search-overlay input:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:99px;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;line-height:1}
.btn-grad{background:var(--grad2);color:#fff;box-shadow:0 2px 12px rgba(168,85,247,.35)}
.btn-grad:hover{box-shadow:0 4px 20px rgba(168,85,247,.5);transform:translateY(-1px)}
.btn-outline{border:1px solid var(--border2);color:var(--txt2);background:var(--glass)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:rgba(168,85,247,.08)}
.btn-ghost{color:var(--txt2);padding:6px 10px;border-radius:var(--r)}
.btn-ghost:hover{background:var(--glass2);color:var(--txt1)}
.btn-sm{padding:5px 14px;font-size:12px}.btn-xs{padding:3px 10px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-danger{color:var(--red)}.btn-danger:hover{background:rgba(239,68,68,.1)}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-xl)}
.post-row{display:flex;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-xl);margin-bottom:10px;cursor:pointer;transition:all .2s;overflow:hidden}
.post-row:hover{border-color:var(--border2);background:var(--bg2);transform:translateY(-1px);box-shadow:var(--shadow)}
.post-row.pinned{border-left:2px solid var(--accent)}
.post-body{flex:1;padding:12px 14px 10px;min-width:0}
.post-meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-bottom:8px;flex-wrap:wrap}
.post-cat{font-weight:700;font-size:11px;padding:2px 8px;border-radius:99px}
.post-by{color:var(--txt2);font-weight:500}.post-by:hover{color:var(--accent);text-decoration:underline}
.post-title{font-size:16px;font-weight:600;line-height:1.4;margin-bottom:8px;color:var(--txt1)}
.post-actions{display:flex;align-items:center;gap:4px;margin-top:10px;flex-wrap:wrap}
.post-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r);font-size:12px;font-weight:600;color:var(--txt3);transition:all .1s}
.post-btn:hover{background:var(--glass2);color:var(--txt1)}
.post-btn.saved{color:var(--gold)}
.ivbar{display:flex;align-items:center;gap:4px;background:var(--glass);border-radius:99px;padding:4px 10px;margin-right:2px}
.ivbtn{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:var(--r);color:var(--txt3);transition:all .15s;background:none;border:none;cursor:pointer;padding:0}
.ivbtn:hover{background:var(--glass2);transform:scale(1.15)}
.ivbtn.liked{color:var(--accent)}.ivbtn.disliked{color:var(--red)}
.ivscore{font-size:13px;font-weight:700;color:var(--txt2);min-width:20px;text-align:center}
.post-media{overflow:hidden;max-height:500px;background:var(--bg0);display:flex;align-items:center;justify-content:center;border-radius:var(--r);margin-top:8px}
.post-media img{max-width:100%;max-height:500px;object-fit:contain;display:block}
.post-media video{max-width:100%;max-height:500px}
.post-media-sm{max-height:280px}
.lp-card{display:flex;flex-direction:column;border:1px solid var(--border2);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;background:var(--bg2);transition:border-color .15s;margin-top:8px}
.lp-card:hover{border-color:var(--accent3)}
.lp-img{width:100%;max-height:360px;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.lp-img img{width:100%;height:100%;object-fit:cover;display:block;max-height:360px}
.lp-img.empty{display:none}
.lp-body{padding:12px 14px}
.lp-host{font-size:11px;color:var(--txt3);margin-bottom:4px}
.lp-title{font-size:14px;font-weight:600;color:var(--txt1);line-height:1.4}
.lp-desc{font-size:12px;color:var(--txt3);margin-top:4px;line-height:1.5}
.upload-area{border:2px dashed var(--border2);border-radius:var(--r-lg);padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--glass);position:relative}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:rgba(168,85,247,.07)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upbar{height:3px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-top:10px}
.upbar-fill{height:100%;background:var(--grad2);border-radius:99px;transition:width .2s}
.comment{display:flex;margin-bottom:6px}
.cmt-line{width:2px;background:var(--border2);border-radius:1px;margin:0 10px;cursor:pointer;flex-shrink:0;transition:background .15s}
.cmt-line:hover{background:var(--accent)}
.cmt-content{flex:1;min-width:0}
.cmt-header{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.cmt-author{font-size:12px;font-weight:700;cursor:pointer;color:var(--txt1)}.cmt-author:hover{color:var(--accent)}
.cmt-op{background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px}
.cmt-time{font-size:11px;color:var(--txt3)}
.cmt-body{font-size:14px;line-height:1.7;margin-bottom:8px;white-space:pre-wrap;word-break:break-word;color:var(--txt2)}
.cmt-acts{display:flex;align-items:center;gap:2px;flex-wrap:wrap}
.cmt-act{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:var(--r);font-size:11px;font-weight:600;color:var(--txt3)}
.cmt-act:hover{background:var(--glass2);color:var(--txt1)}
.cmt-kids{margin-top:10px}
.collapsed .cmt-body,.collapsed .cmt-kids,.collapsed .cmt-acts{display:none}
.sidebar{display:flex;flex-direction:column;gap:16px;position:sticky;top:calc(var(--nav-h) + 20px)}
.scard{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden}
.scard-hd{padding:14px 16px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border)}
.scard-body{padding:12px 14px}
.scard-rule{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--txt2)}
.scard-rule:last-child{border-bottom:none}
.scard-rule-n{font-weight:700;color:var(--accent);min-width:18px;font-size:12px}
.cat-item{display:flex;align-items:center;gap:10px;padding:8px 4px;border-radius:var(--r);cursor:pointer;font-size:13px;transition:all .1s;color:var(--txt2)}
.cat-item:hover{background:var(--glass2);color:var(--txt1)}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat-pill{display:inline-flex;flex-direction:column;align-items:center;padding:8px 16px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r-lg)}
.stat-num{font-family:var(--font-d);font-size:1.2rem;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em}
.c-hero{border-radius:var(--r-xl);overflow:hidden;margin-bottom:20px}
.c-hero-bg{height:90px;position:relative}
.c-hero-body{background:var(--bg1);border:1px solid var(--border);padding:40px 20px 18px;position:relative}
.c-hero-icon{width:64px;height:64px;border-radius:var(--r-lg);background:var(--bg2);border:3px solid var(--bg1);position:absolute;top:-32px;left:20px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:var(--shadow)}
.sort-bar{display:flex;align-items:center;gap:4px;padding:10px 14px;border-bottom:1px solid var(--border)}
.sort-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:99px;font-size:12px;font-weight:600;color:var(--txt3);transition:all .15s}
.sort-btn:hover{background:var(--glass2);color:var(--txt1)}
.sort-btn.active{background:rgba(168,85,247,.15);color:var(--accent);border:1px solid rgba(168,85,247,.2)}
.ptabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.ptab{padding:12px 20px;font-size:13px;font-weight:600;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.ptab:hover{color:var(--txt1)}.ptab.active{color:var(--accent);border-bottom-color:var(--accent)}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em}
.input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);padding:10px 14px;color:var(--txt1);transition:all .2s;font-size:13px}
.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(168,85,247,.12)}
.input::placeholder{color:var(--txt3)}
textarea.input{resize:vertical;min-height:100px;line-height:1.6}
select.input{appearance:none;cursor:pointer}
.fstack{display:flex;flex-direction:column;gap:16px}
.ferr{font-size:12px;color:var(--red)}
.avatar{border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.flair{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700}
.flair-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.flair-opt{padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid transparent;opacity:.65;transition:all .15s}
.flair-opt:hover{opacity:1;transform:translateY(-1px)}.flair-opt.sel{opacity:1;border-color:rgba(255,255,255,.3)}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid}
.pinned-tag{color:var(--accent);background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.3)}
.locked-tag{color:var(--txt3);background:var(--glass);border-color:var(--border)}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 16px;border-radius:var(--r-lg);font-size:13px;font-weight:600;max-width:320px;animation:toastIn .25s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);border:1px solid var(--border2)}
.toast.ok{background:var(--bg2);border-left:3px solid var(--green)}
.toast.er{background:var(--bg2);border-left:3px solid var(--red)}
.toast.info{background:var(--bg2);border-left:3px solid var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:none}}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;position:relative}
.auth-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.2) 0%,transparent 70%);pointer-events:none}
.auth-box{width:100%;max-width:420px;position:relative;z-index:1}
.auth-logo{font-family:var(--font-d);font-size:1.6rem;font-weight:700;text-align:center;margin-bottom:24px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:flex;align-items:center;justify-content:center;gap:10px}
.auth-card{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r-xl);padding:28px;box-shadow:var(--shadow-lg)}
.auth-foot{text-align:center;margin-top:16px;font-size:13px;color:var(--txt3)}
.auth-foot a{color:var(--accent);cursor:pointer;font-weight:600}.auth-foot a:hover{text-decoration:underline}
.profile-banner{height:130px;border-radius:var(--r-xl) var(--r-xl) 0 0}
.profile-body{background:var(--bg1);border:1px solid var(--border);border-radius:0 0 var(--r-xl) var(--r-xl);padding:20px}
.profile-av{width:88px;height:88px;border-radius:var(--r-xl);border:3px solid var(--bg1);background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:absolute;top:-44px;left:20px;box-shadow:var(--glow)}
.profile-av img{width:100%;height:100%;object-fit:cover;cursor:zoom-in}
.profile-av-edit{position:absolute;top:-44px;left:80px;width:26px;height:26px;background:var(--grad2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:12px;box-shadow:var(--shadow)}
.reply-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);overflow:hidden}
.reply-box textarea{width:100%;border:none;padding:12px 14px;font-size:14px;resize:vertical;min-height:90px;background:transparent;color:var(--txt1);outline:none;font-family:var(--font);line-height:1.6}
.reply-box-foot{display:flex;justify-content:flex-end;padding:10px 12px;background:var(--glass);border-top:1px solid var(--border);gap:8px}
.detail-body{font-size:15px;line-height:1.8;white-space:pre-wrap;word-break:break-word;color:var(--txt2);background:var(--glass);padding:14px;border-radius:var(--r-lg);margin-top:10px;border:1px solid var(--border)}
.divider{height:1px;background:var(--border);margin:14px 0}
.empty{text-align:center;padding:48px 20px;color:var(--txt3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.loading{text-align:center;color:var(--txt3);padding:40px;font-size:13px}
.row{display:flex;align-items:center;gap:8px}.row.wrap{flex-wrap:wrap}
.flex1{flex:1}.mt1{margin-top:8px}.mt2{margin-top:16px}.mb1{margin-bottom:8px}.mb2{margin-bottom:16px}
.txt-sm{font-size:12px}.txt-dim{color:var(--txt3)}.txt-accent{color:var(--accent)}.bold{font-weight:700}.w-full{width:100%}
/* ADMIN */
.admin-wrap{max-width:1100px;margin:0 auto;padding:24px}
.admin-tabs{display:flex;gap:4px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-xl);padding:6px;margin-bottom:24px;flex-wrap:wrap}
.admin-tab{padding:8px 18px;border-radius:var(--r-lg);font-size:13px;font-weight:600;cursor:pointer;color:var(--txt3);transition:all .15s;border:none;background:none}
.admin-tab:hover{color:var(--txt1);background:var(--glass2)}
.admin-tab.active{background:var(--grad2);color:#fff}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-xl);padding:20px;text-align:center}
.stat-card-num{font-family:var(--font-d);font-size:2rem;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card-lbl{font-size:12px;color:var(--txt3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--glass)}
.admin-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--txt2);vertical-align:middle}
.admin-table tr:hover td{background:var(--glass)}
.admin-table tr:last-child td{border-bottom:none}
.role-badge{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
.role-admin{background:rgba(168,85,247,.2);color:var(--accent)}
.role-mod{background:rgba(6,182,212,.2);color:var(--accent3)}
.role-member{background:var(--glass);color:var(--txt3)}
.banned-badge{background:rgba(239,68,68,.2);color:var(--red);display:inline-flex;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
.admin-form{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-xl);padding:24px;margin-bottom:20px}
.admin-form h3{font-family:var(--font-d);font-size:1rem;font-weight:700;margin-bottom:16px;color:var(--txt1)}
.action-row{display:flex;gap:6px;flex-wrap:wrap}
.reorder-list{display:flex;flex-direction:column;gap:8px}
.reorder-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);cursor:grab}
.reorder-item:active{cursor:grabbing;background:var(--bg3)}
.reorder-handle{color:var(--txt3);font-size:16px;cursor:grab;flex-shrink:0}
.reorder-icon{font-size:20px;flex-shrink:0}
.reorder-info{flex:1}
.reorder-name{font-weight:600;font-size:13px}
.reorder-slug{font-size:11px;color:var(--txt3)}
/* CATEGORIES PAGE */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:4px}
.cat-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;cursor:pointer;transition:all .2s}
.cat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--border2)}
.cat-card-banner{height:120px;position:relative;display:flex;align-items:flex-end;justify-content:flex-start;overflow:hidden}
.cat-card-icon{width:52px;height:52px;border-radius:10px;position:relative;z-index:1;overflow:hidden;margin:0 12px 12px;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--bg2);border:2px solid rgba(255,255,255,.15);flex-shrink:0}
.cat-card-body{padding:14px 16px}
.cat-card-name{font-family:var(--font-d);font-size:1rem;font-weight:700;margin-bottom:4px}
.cat-card-desc{font-size:12px;color:var(--txt3);line-height:1.5;margin-bottom:10px;min-height:36px}
.cat-card-footer{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--txt3)}
/* NOTIFICATIONS */
.notif-dropdown{position:fixed;top:calc(var(--nav-h) + 8px);right:80px;width:360px;background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);z-index:500;max-height:480px;overflow:hidden;display:none;flex-direction:column}
.notif-dropdown.show{display:flex}
.notif-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;flex-shrink:0}
.notif-list{overflow-y:auto;flex:1}
.notif-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.notif-item:hover{background:var(--glass2)}
.notif-item.unread{background:rgba(168,85,247,.06)}
.notif-msg{font-size:13px;color:var(--txt2);line-height:1.5;flex:1}
.notif-time{font-size:11px;color:var(--txt3);margin-top:3px}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.notif-empty{text-align:center;padding:32px 16px;color:var(--txt3);font-size:13px}
/* ONLINE STATUS */
.online-dot{width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--bg1);flex-shrink:0;animation:pulse 2s infinite}
.offline-dot{width:10px;height:10px;border-radius:50%;background:var(--txt3);border:2px solid var(--bg1);flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
/* MESSAGES PAGE */
.dm-layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - var(--nav-h) - 56px);max-height:680px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden}

/* Sidebar */
.dm-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.dm-sidebar-hd{padding:16px;font-weight:700;font-size:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--bg2)}
.dm-list{flex:1;overflow-y:auto}
.dm-item{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.dm-item:hover{background:var(--glass)}
.dm-item.active{background:rgba(168,85,247,.1);border-left:3px solid var(--accent);padding-left:13px}
.dm-item-name{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:2px}
.dm-item-preview{font-size:12px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
.dm-item-unread{min-width:20px;height:20px;background:var(--accent);color:#fff;border-radius:99px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;margin-left:auto;flex-shrink:0}

/* Main chat area */
.dm-main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg0)}
.dm-main-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg1);min-height:58px}
.dm-main-hd .dm-user-info{flex:1;min-width:0}
.dm-main-hd .dm-user-name{font-weight:700;font-size:14px;color:var(--txt1)}
.dm-main-hd .dm-user-status{font-size:11px;color:var(--txt3);margin-top:1px}

/* Messages */
.dm-messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:4px;min-height:0}
.dm-msg-group{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.dm-msg-group.mine{align-items:flex-end}
.dm-msg-group.theirs{align-items:flex-start}
.dm-date-sep{text-align:center;font-size:11px;color:var(--txt3);font-weight:600;margin:10px 0 6px;letter-spacing:.03em}
.dm-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--txt3)}

/* Bubbles */
.chat-msg{max-width:72%;padding:9px 13px;border-radius:18px;font-size:13.5px;line-height:1.55;word-break:break-word;position:relative}
.chat-msg.mine{background:var(--grad2);color:#fff;border-bottom-right-radius:4px}
.chat-msg.theirs{background:var(--bg2);color:var(--txt1);border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-msg-time{font-size:10px;margin-top:3px;opacity:.65}
.chat-msg.mine .chat-msg-time{text-align:right;color:rgba(255,255,255,.8)}
.chat-msg.theirs .chat-msg-time{color:var(--txt3)}

/* Input */
.dm-input-area{padding:12px 14px;border-top:1px solid var(--border);background:var(--bg1);flex-shrink:0}
.dm-input-row{display:flex;gap:8px;align-items:flex-end;background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:6px 6px 6px 14px;transition:border-color .15s}
.dm-input-row:focus-within{border-color:var(--accent)}
.dm-textarea{flex:1;background:transparent;border:none;padding:6px 0;color:var(--txt1);font-size:13px;outline:none;font-family:var(--font);resize:none;min-height:28px;max-height:100px;line-height:1.5}
.dm-send-btn{width:36px;height:36px;border-radius:50%;background:var(--grad2);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;padding:0}
.dm-send-btn:hover{transform:scale(1.08)}
.dm-send-btn svg{width:16px;height:16px}
.msg-unread-badge{min-width:18px;height:18px;background:var(--accent);color:#fff;border-radius:99px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;margin-left:auto}
/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;cursor:pointer;animation:fadeIn .2s}
.lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:var(--r-lg);box-shadow:var(--shadow-lg)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
/* FORGOT PASSWORD */
.code-inputs{display:flex;gap:10px;justify-content:center;margin:20px 0}
.code-input{width:48px;height:56px;text-align:center;font-size:22px;font-weight:700;font-family:var(--font-d);background:var(--bg2);border:2px solid var(--border2);border-radius:var(--r-lg);color:var(--txt1);transition:all .15s}
.code-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
.code-input.filled{border-color:var(--accent)}
.step-indicator{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .2s}
.step-dot.active{background:var(--accent);width:24px;border-radius:99px}
.step-dot.done{background:var(--green)}

/* MOBILE BOTTOM NAV */
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(8,11,20,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));grid-template-columns:repeat(4,1fr)}
.mbn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 1px;cursor:pointer;color:var(--txt3);transition:color .15s;font-size:9px;font-weight:600;border:none;background:none;font-family:var(--font);white-space:nowrap}
.mbn-btn:hover,.mbn-btn.active{color:var(--accent)}
.mbn-btn svg{width:18px;height:18px}
@media(max-width:600px){
  .mobile-bottom-nav{display:grid}
  body{padding-bottom:65px}
  .toast-wrap{bottom:80px}
}

/* CHAT MEDIA */
.dm-media-img{max-width:100%;max-height:260px;border-radius:12px;display:block;cursor:zoom-in;margin-top:4px}
.dm-media-audio{width:100%;margin-top:6px;border-radius:8px;outline:none}
.dm-lp-card{border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;margin-top:6px;cursor:pointer;background:rgba(0,0,0,.2);transition:opacity .15s}
.dm-lp-card:hover{opacity:.85}
.dm-lp-img{width:100%;max-height:160px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.15)}
.dm-lp-img img{width:100%;object-fit:cover;max-height:160px}
.dm-lp-body{padding:8px 10px}
.dm-lp-host{font-size:10px;opacity:.6;margin-bottom:2px}
.dm-lp-title{font-size:12px;font-weight:600;line-height:1.4}
/* Attach button */
.dm-attach-btn{background:none;border:none;color:var(--txt3);cursor:pointer;padding:6px;border-radius:50%;transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.dm-attach-btn:hover{color:var(--accent);background:rgba(168,85,247,.1)}
.dm-attach-menu{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);padding:8px;display:flex;flex-direction:column;gap:4px;box-shadow:var(--shadow);z-index:10;min-width:160px}
.dm-attach-opt{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;color:var(--txt2);transition:background .1s;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.dm-attach-opt:hover{background:var(--glass2);color:var(--txt1)}
.dm-preview-wrap{padding:8px 14px 0;background:var(--bg1);border-top:1px solid var(--border)}
.dm-preview-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--glass);border-radius:var(--r-lg);position:relative}
.dm-preview-thumb{width:48px;height:48px;border-radius:var(--r);object-fit:cover;flex-shrink:0}
.dm-preview-name{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dm-preview-size{font-size:11px;color:var(--txt3)}
.dm-preview-remove{position:absolute;top:4px;right:4px;width:20px;height:20px;background:var(--red);color:#fff;border-radius:50%;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;line-height:1}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* READ RECEIPTS */
.dm-seen{display:flex;justify-content:flex-end;align-items:center;gap:4px;margin-top:1px;margin-bottom:4px;padding-right:2px}
.dm-seen-txt{font-size:10px;color:var(--txt3)}
.dm-seen-icon{font-size:11px}
.dm-tick{display:inline-flex;align-items:center;color:var(--txt3)}
.dm-tick.seen{color:#4fc3f7}

/* MOBILE NAV — hide avatar+name, keep icons */
@media(max-width:600px){
  .nav-user{ display:none !important }
  .nav-avatar-wrap{ display:none !important }
  /* Show gamehub text on mobile since profile tab handles navigation */
  .nav-logo-text{ display:inline !important }

<script>
const API = 'https://gamehub-backend.shotavixofficial.workers.dev/api'
const GOOGLE_CLIENT_ID = '669488745339-5sb4fjh3ndcpucc81rgu42ukffugknoi.apps.googleusercontent.com'
const S = {
  user: JSON.parse(localStorage.getItem('gh_user')||'null'),
  token: localStorage.getItem('gh_token')||null,
  page:'home', params:{},
  votes: JSON.parse(localStorage.getItem('gh_votes')||'{}'),
  saves: JSON.parse(localStorage.getItem('gh_saves')||'{}'),
}
function setAuth(t,u){
  S.token=t;S.user=u
  localStorage.setItem('gh_token',t)
  localStorage.setItem('gh_user',JSON.stringify(u))
  // Clear stale votes from any previous session, then reload from server
  S.votes={}
  localStorage.removeItem('gh_votes')
  loadUserVotes()
}
function clearAuth(){
  S.token=null;S.user=null
  S.votes={};S.saves={}
  localStorage.removeItem('gh_token')
  localStorage.removeItem('gh_user')
  localStorage.removeItem('gh_votes')
  localStorage.removeItem('gh_saves')
}
async function loadUserVotes(){
  if(!S.user || !S.token) return
  try{
    var r = await GET('/votes/mine')
    if(r && r.votes){
      S.votes = r.votes
      localStorage.setItem('gh_votes', JSON.stringify(S.votes))
      // Refresh any visible vote bars on the current page
      document.querySelectorAll('.ivbar').forEach(function(bar){
        var id = bar.dataset.id
        var type = bar.dataset.type
        var v = S.votes[id] || 0
        var upBtn = bar.querySelector('.ivbtn:first-child')
        var dnBtn = bar.querySelector('.ivbtn:last-child')
        var scoreEl = bar.querySelector('.ivscore')
        if(upBtn){ upBtn.className='ivbtn'+(v===1?' liked':''); var s=upBtn.querySelector('svg'); if(s)s.setAttribute('fill',v===1?'currentColor':'none') }
        if(dnBtn){ dnBtn.className='ivbtn'+(v===-1?' disliked':''); var s2=dnBtn.querySelector('svg'); if(s2)s2.setAttribute('fill',v===-1?'currentColor':'none') }
        if(scoreEl){ scoreEl.style.color=v===1?'var(--accent)':v===-1?'var(--red)':'var(--txt2)' }
      })
    }
  }catch(e){}
}

function go(page,params){
  S.page=page;S.params=params||{};window.scrollTo(0,0)
  closeMobileSearch()
  try{
    var hash='#'+page
    if(params&&params.id) hash+='/'+params.id
    if(params&&params.username) hash+='/'+params.username
    if(params&&params.category) hash+='/'+params.category
    if(params&&params.slug) hash+='/'+params.slug
    history.pushState({page:page,params:params||{}}, '', hash)
  }catch(e){}
  render()
}
function restoreFromUrl(){
  try{
    var hash=window.location.hash.slice(1)
    if(!hash) return
    var parts=hash.split('/')
    var page=parts[0], param=parts[1]
    if(!page) return
    S.page=page
    if(page==='thread'&&param) S.params={id:param}
    else if(page==='profile'&&param) S.params={username:param}
    else if(page==='forum'&&param) S.params={category:param}
    else if(page==='manage-community'&&param) S.params={slug:param}
    else S.params={}
  }catch(e){}
}

  if(e.state&&e.state.page){S.page=e.state.page;S.params=e.state.params||{};render()}
  else{S.page='home';S.params={};render()}
})

async function apiFetch(path,opts){
  opts=opts||{}
  var h={'Content-Type':'application/json'}
  if(S.token) h['Authorization']='Bearer '+S.token
  var res=await fetch(API+path,Object.assign({headers:h},opts))
  var data=await res.json().catch(function(){return {}})
  if(!res.ok) throw new Error(data.error||'HTTP '+res.status)
  return data
}
function GET(p){return apiFetch(p)}
function POST(p,b){return apiFetch(p,{method:'POST',body:JSON.stringify(b)})}
function PATCH(p,b){return apiFetch(p,{method:'PATCH',body:JSON.stringify(b)})}
function DEL(p){return apiFetch(p,{method:'DELETE'})}

function toast(msg,type){
  type=type||'ok'
  var el=document.createElement('div')
  el.className='toast '+type
  el.innerHTML='<span>'+(type==='ok'?'✓':type==='info'?'ℹ':'✕')+'</span><span>'+msg+'</span>'
  document.getElementById('toasts').appendChild(el)
  setTimeout(function(){el.remove()},3500)
}
function ago(d){
  if(!d) return ''
  var date=new Date(d.indexOf('T')>=0?d:d.replace(' ','T')+'Z')
  var s=Math.floor((Date.now()-date.getTime())/1000)
  if(s<5) return 'just now'
  if(s<60) return s+'s ago'
  if(s<3600) return Math.floor(s/60)+'m ago'
  if(s<86400) return Math.floor(s/3600)+'h ago'
  if(s<604800) return Math.floor(s/86400)+'d ago'
  return date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hue(s){return Array.from(s||'').reduce(function(a,c){return a+c.charCodeAt(0)},0)%360}
function avHtml(username,size,url){
  size=size||32
  if(url) return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;border-radius:'+Math.floor(size*.25)+'px"><img src="'+esc(url)+'" alt="'+esc(username)+'"/></div>'
  var cols=[['#7c3aed','#4c1d95'],['#ec4899','#831843'],['#06b6d4','#164e63'],['#10b981','#064e3b'],['#f59e0b','#78350f'],['#ef4444','#7f1d1d']]
  var c=cols[hue(username)%cols.length]
  return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;border-radius:'+Math.floor(size*.25)+'px;background:linear-gradient(135deg,'+c[0]+','+c[1]+');font-size:'+Math.floor(size*.38)+'px;color:#fff">'+( username||'?').slice(0,2).toUpperCase()+'</div>'
}

function ivbarHtml(id,score,type){

    +'<button class="ivbtn'+(v===1?' liked':'')+'" data-vid="'+esc(id)+'" data-vtype="'+type+'" data-vdir="1" onclick="event.stopPropagation();voteClick(this)" title="Like">'+thumbUp(v===1)+'</button>'
    +'<span class="ivscore'+(v===1?' up':v===-1?' dn':'')+'" style="color:'+(v===1?'var(--accent)':v===-1?'var(--red)':'var(--txt2)')+'">'+display+'</span>'
    +'<button class="ivbtn'+(v===-1?' disliked':'')+'" data-vid="'+esc(id)+'" data-vtype="'+type+'" data-vdir="-1" onclick="event.stopPropagation();voteClick(this)" title="Dislike">'+thumbDn(v===-1)+'</button>'

function voteClick(btn){event.stopPropagation();castVote(btn.dataset.vid,btn.dataset.vtype,parseInt(btn.dataset.vdir),btn)}
async function castVote(id,type,dir,btn){
  if(!S.user){toast('Log in to vote','er');return}
  var prev=S.votes[id]||0, newDir=prev===dir?0:dir
  S.votes[id]=newDir;localStorage.setItem('gh_votes',JSON.stringify(S.votes))
  var wrap=btn?btn.closest('.ivbar'):null
  if(wrap){
    var base=parseInt(wrap.dataset.base||0), display=base-prev+newDir
    var upBtn=wrap.querySelector('.ivbtn:first-child')
    var dnBtn=wrap.querySelector('.ivbtn:last-child')
    var scoreEl=wrap.querySelector('.ivscore')
    if(upBtn){upBtn.className='ivbtn'+(newDir===1?' liked':'');var s=upBtn.querySelector('svg');if(s)s.setAttribute('fill',newDir===1?'currentColor':'none')}
    if(dnBtn){dnBtn.className='ivbtn'+(newDir===-1?' disliked':'');var s2=dnBtn.querySelector('svg');if(s2)s2.setAttribute('fill',newDir===-1?'currentColor':'none')}
    if(scoreEl){scoreEl.textContent=display;scoreEl.style.color=newDir===1?'var(--accent)':newDir===-1?'var(--red)':'var(--txt2)'}
  }
  try{
    var r=await POST('/votes',{target_type:type,target_id:id,value:newDir})
    if(r&&r.score!==undefined&&wrap){
      var sc=wrap.querySelector('.ivscore');if(sc)sc.textContent=r.score
      wrap.dataset.base=r.score-newDir
    }
  }catch(e){}
}
function toggleSave(id,btn){
  if(!S.user){toast('Log in to save','er');return}
  S.saves[id]=!S.saves[id];localStorage.setItem('gh_saves',JSON.stringify(S.saves))
  if(btn){btn.className='post-btn'+(S.saves[id]?' saved':'');btn.textContent='🔖 '+(S.saves[id]?'Saved':'Save')}
  toast(S.saves[id]?'Post saved!':'Removed from saved')
}

async function fetchLinkPreviews(){
  document.querySelectorAll('.lp-card[data-url]').forEach(async function(card){
    var url=card.dataset.url, id=card.dataset.id
    if(!url||!id) return
    if(lpCache[url]){applyLP(id,lpCache[url]);return}
    try{var data=await GET('/link-preview?url='+encodeURIComponent(url));lpCache[url]=data;applyLP(id,data)}catch(e){}
  })
}
function applyLP(id,data){
  var t=document.getElementById('lpt-'+id),d=document.getElementById('lpd-'+id),i=document.getElementById('lpi-'+id)
  if(t&&data.title)t.textContent=data.title.slice(0,80)
  if(d&&data.description)d.textContent=data.description.slice(0,120)
  if(i&&data.image){i.classList.remove('empty');i.innerHTML='<img src="'+esc(data.image)+'" onerror="this.parentElement.classList.add(\'empty\')"  loading="lazy"/>'
  }else if(i)i.classList.add('empty')
  else if(i)i.style.display='none'
}
function lpCardHtml(id,url){

    return '<div class="lp-card" data-url="'+esc(url)+'" data-id="'+esc(id)+'" onclick="event.stopPropagation();window.open(this.dataset.url,\'_blank\')">'
      +'<div class="lp-img empty" id="lpi-'+esc(id)+'"></div>'

      +'<div class="lp-title" id="lpt-'+esc(id)+'">'+esc(url.length>55?url.slice(0,55)+'…':url)+'</div>'

}

function openLightbox(src){
  var lb=document.createElement('div');lb.className='lightbox'
  lb.innerHTML='<img src="'+esc(src)+'" alt=""/>'
  lb.onclick=function(){lb.remove()}
  document.addEventListener('keydown',function eh(e){if(e.key==='Escape'){lb.remove();document.removeEventListener('keydown',eh)}})
  document.body.appendChild(lb)

// SEARCH
var srchTimer=null
function openMobileSearch(){
  var overlay = document.getElementById('mobile-srch-overlay')
  var input = document.getElementById('mobile-srch')
  if(!overlay) return
  overlay.classList.add('show')
  if(input){ input.value=''; setTimeout(function(){ input.focus() }, 100) }
}
function closeMobileSearch(){
  var overlay = document.getElementById('mobile-srch-overlay')
  if(overlay) overlay.classList.remove('show')
}

function initSearch(){
  var inp=document.getElementById('srch'),dd=document.getElementById('srch-dd')
  if(!inp||!dd) return
  inp.oninput=function(){
    clearTimeout(srchTimer)
    if(!this.value.trim()){dd.classList.remove('show');return}
    var q=this.value.trim()
    srchTimer=setTimeout(function(){runSearch(q)},300)
  }
  inp.onkeydown=function(e){if(e.key==='Enter'&&this.value.trim()){dd.classList.remove('show');go('search',{q:this.value.trim()})}}
  document.addEventListener('click',function(e){if(!e.target.closest('.nav-search'))dd.classList.remove('show')})

  // Mobile search overlay input
  var mobileInp=document.getElementById('mobile-srch')
  if(mobileInp){
    mobileInp.oninput=function(){
      clearTimeout(srchTimer)
      if(!this.value.trim()) return
      var q=this.value.trim()
      srchTimer=setTimeout(function(){runSearch(q)},300)
    }
    mobileInp.onkeydown=function(e){
      if(e.key==='Enter'&&this.value.trim()){
        closeMobileSearch()
        go('search',{q:this.value.trim()})
      }
    }
  }
}
async function runSearch(q){
  var dd=document.getElementById('srch-dd');if(!dd)return
  dd.innerHTML='<div style="padding:14px;color:var(--txt3);font-size:13px">Searching…</div>';dd.classList.add('show')
  try{
    var res=await GET('/search?q='+encodeURIComponent(q));var h=''
    if(res.users.length){h+='<div class="srch-sec">👤 Users</div>'+res.users.map(function(u){return '<div class="srch-item" onclick="document.getElementById(\'srch-dd\').classList.remove(\'show\');go(\'profile\',{username:\''+esc(u.username)+'\'})">'+ avHtml(u.username,30,u.avatar_url)+'<div><div class="srch-title">u/'+esc(u.username)+'</div><div class="srch-sub">'+esc(u.bio||'No bio')+'</div></div></div>'}).join('')}
    if(res.threads.length){h+='<div class="srch-sec">📝 Posts</div>'+res.threads.map(function(t){return '<div class="srch-item" onclick="document.getElementById(\'srch-dd\').classList.remove(\'show\');go(\'thread\',{id:\''+esc(t.id)+'\'})">'+'<div><div class="srch-title">'+esc(t.title)+'</div><div class="srch-sub">'+esc(t.category_name)+' · u/'+esc(t.username)+' · '+ago(t.created_at)+'</div></div></div>'}).join('')}
    if(!res.users.length&&!res.threads.length)h='<div style="padding:16px;text-align:center;color:var(--txt3)">No results</div>'
    dd.innerHTML=h
  }catch(e){dd.innerHTML='<div style="padding:14px;color:var(--red);font-size:13px">Search failed</div>'}
}

var _reportTarget = null
function openReportModal(el){
  if(!S.user){ toast('Sign in to report content','er'); go('login'); return }
  _reportTarget = { id: el.dataset.id, type: el.dataset.type, label: el.dataset.label||'' }
  var reasons = ['Spam or misleading','Harassment or bullying','Hate speech or discrimination',
    'Violence or dangerous content','Sexual content','Misinformation','Child safety concern','Other']
  var existing = document.getElementById('report-modal-overlay')
  if(existing) existing.remove()
  var div = document.createElement('div')
  div.id = 'report-modal-overlay'
  div.className = 'report-modal'
  div.innerHTML = '<div class="report-modal-box">'
    +'<div style="font-family:var(--font-d);font-size:1.1rem;font-weight:700;margin-bottom:6px">Report '+esc(_reportTarget.type)+'</div>'
    +'<div style="font-size:12px;color:var(--txt3);margin-bottom:16px">'+esc(_reportTarget.label)+'</div>'
    +reasons.map(function(r){
      return '<button class="report-reason-btn" onclick="selectReportReason(this,\''+esc(r)+'\')">'+esc(r)+'</button>'
    }).join('')
    +'<textarea class="input" id="report-details" style="min-height:60px;margin-top:8px" placeholder="Additional details (optional)"></textarea>'
    +'<div style="display:flex;gap:8px;margin-top:16px">'
    +'<button class="btn btn-ghost flex1" onclick="closeReportModal()">Cancel</button>'
    +'<button class="btn btn-grad flex1" id="report-submit-btn" onclick="submitReport()" disabled>Submit Report</button>'
    +'</div></div>'
  document.body.appendChild(div)
  div.addEventListener('click', function(e){ if(e.target===div) closeReportModal() })
}
function selectReportReason(el, reason){
  document.querySelectorAll('.report-reason-btn').forEach(function(b){ b.classList.remove('selected') })
  el.classList.add('selected')
  el.dataset.reason = reason
  document.getElementById('report-submit-btn').disabled = false
  window._reportReason = reason
}
function closeReportModal(){
  var el = document.getElementById('report-modal-overlay')
  if(el) el.remove()
  _reportTarget = null
  window._reportReason = null
}
async function submitReport(){
  if(!_reportTarget || !window._reportReason) return
  var details = (document.getElementById('report-details')||{}).value||''
  try{
    await POST('/reports', { target_type: _reportTarget.type, target_id: _reportTarget.id, reason: window._reportReason, details: details })
    toast('Report submitted — thank you')
    closeReportModal()
  }catch(e){ toast(e.message,'er') }
}

async function loadBlockStatus(userId){
  try{
    var r = await GET('/users/'+userId+'/block-status')
    var btn = document.getElementById('profile-block-btn')
    if(btn){ btn.classList.toggle('blocked', !!r.blocked); btn.textContent = r.blocked ? 'Unblock' : 'Block' }
  }catch(e){}
}
async function toggleBlockBtn(btn){
  var uid = btn.dataset.uid
  var isBlocked = btn.classList.contains('blocked')
  try{
    if(isBlocked){
      await apiFetch('/users/'+uid+'/block', {method:'DELETE'})
      btn.classList.remove('blocked'); btn.textContent = 'Block'
      toast('User unblocked')
    } else {
      if(!confirm('Block this user? Their posts and messages will be hidden from you.')) return
      await apiFetch('/users/'+uid+'/block', {method:'POST'})
      btn.classList.add('blocked'); btn.textContent = 'Unblock'
      toast('User blocked')
    }
  }catch(e){ toast(e.message,'er') }
}

async function fpResetForLoggedInUser(){
  // User is already logged in — send reset code to THEIR email only, skip email entry step
  if(!S.user) { renderForgotPassword(); return }
  var email = S.user.email
  if(!email) { toast('No email on your account','er'); return }
  toast('Sending reset code to ' + email + '...', 'info')
  try{
    var r = await POST('/auth/forgot-password', {email: email})
    fpEmail = email
    fpStep = 2
    if(r.dev_mode && r.dev_code){
      toast('Dev mode: code is ' + r.dev_code, 'info')
      showFPStep()
      setTimeout(function(){
        var code = r.dev_code.toString()
        for(var i=0;i<6;i++){
          var el=document.getElementById('ci'+i)
          if(el){ el.value=code[i]||''; el.classList.toggle('filled',!!code[i]) }
        }
      }, 200)
    } else {
      toast('Reset code sent to ' + email, 'info')
      showFPStep()
    }
  } catch(e){
    toast(e.message || 'Failed to send code', 'er')
  }
}



async function submitChangePassword(){
  var oldPw = (document.getElementById('cpw-old')||{}).value||''
  var newPw = (document.getElementById('cpw-new')||{}).value||''
  var confirmPw = (document.getElementById('cpw-confirm')||{}).value||''
  var errEl = document.getElementById('cpw-err')
  var btn = document.getElementById('cpw-btn')
  errEl.style.display = 'none'

  if(!oldPw||!newPw||!confirmPw){ errEl.textContent='Fill in all fields'; errEl.style.display='block'; return }
  if(newPw.length < 8){ errEl.textContent='New password must be at least 8 characters'; errEl.style.display='block'; return }
  if(newPw !== confirmPw){ errEl.textContent='New passwords do not match'; errEl.style.display='block'; return }
  if(oldPw === newPw){ errEl.textContent='New password must be different from current'; errEl.style.display='block'; return }

  btn.disabled=true; btn.textContent='Updating...'
  try{
    await apiFetch('/auth/change-password', {method:'POST', body:JSON.stringify({old_password:oldPw, new_password:newPw})})
    closeChangePw()
    toast('Password updated successfully!')
  }catch(e){
    errEl.textContent = e.message
    errEl.style.display = 'block'
    btn.disabled=false; btn.textContent='Update Password'
  }
}

function shuffleArray(arr){
  var a = arr.slice()
  for(var i = a.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1))
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp
  }
  return a
}

function processFile(file){

  window._file=file;var url=URL.createObjectURL(file),isV=file.type.startsWith('video/')

  var title=(document.getElementById('nt-title')||{}).value||'';title=title.trim()
  var body=(document.getElementById('nt-body')||{}).value||'';body=body.trim()

  var btn=document.getElementById('nt-btn');btn.disabled=true;btn.textContent='Publishing…'

  if(tab==='image'&&window._file){
    btn.textContent='Uploading…'
    var upbar=document.getElementById('upbar'),fill=document.getElementById('upfill')
    if(upbar)upbar.style.display=''
    var pct=0;var ticker=setInterval(function(){pct=Math.min(pct+3,90);if(fill)fill.style.width=pct+'%'},200)
    try{var fd=new FormData();fd.append('file',window._file);var res=await fetch(API+'/upload',{method:'POST',headers:{Authorization:'Bearer '+S.token},body:fd});clearInterval(ticker);if(fill)fill.style.width='100%';var data=await res.json();if(!res.ok)throw new Error(data.error||'Upload failed');media_url=data.url;media_type=data.media_type}
    catch(e){clearInterval(ticker);errEl.textContent='Upload failed: '+e.message;errEl.style.display='block';btn.disabled=false;btn.textContent='Publish Post';return}
  }
  if(tab==='link'){var lnk=(document.getElementById('nt-link')||{}).value||'';lnk=lnk.trim();if(lnk){media_url=lnk;media_type='link'}}
  try{var r=await POST('/forum/threads',{title:title,body:body,category_id:category_id,flair:window._flair||null,media_url:media_url,media_type:media_type});window._flair='';window._file=null;window._tab='text';toast('Post published! 🎉');go('thread',{id:r.thread.id})}
  catch(e){errEl.textContent=e.message;errEl.style.display='block';btn.disabled=false;btn.textContent='Publish Post'}

async function dmLoadChat(){
  var isMobile = window.innerWidth <= 600
  if(isMobile){
    // Full-page chat experience - overlay everything
    var overlay = document.getElementById('chat-overlay')
    if(!overlay){
      overlay = document.createElement('div')
      overlay.id = 'chat-overlay'
      overlay.style.cssText = 'position:fixed;inset:0;z-index:600;background:var(--bg0);display:flex;flex-direction:column;'
      document.body.appendChild(overlay)
    }
    overlay.innerHTML = buildChatUI()
    await dmRefreshChat(true)
    var inp = document.getElementById('dm-input')
    if(inp) inp.focus()
    return
  }
  // Desktop: render inside dm-main panel as before
  var mainEl = document.getElementById('dm-main')
  if(!mainEl || !currentDMUser) return
  mainEl.innerHTML = buildChatUI()
  await dmRefreshChat(true)
  var inp = document.getElementById('dm-input')
  if(inp){
    inp.focus()
    inp.addEventListener('input', function(){ dmAutoResize(this); dmDetectLink(this) })
    inp.addEventListener('keydown', function(e){ dmKey(e) })
  }
  // Update real online status
  dmUpdateOnlineStatus()
}

async function dmUpdateOnlineStatus(){
  var statusEl = document.getElementById('dm-online-status')
  if(!statusEl || !currentDMUser) return
  try{
    var r = await GET('/users/'+currentDMUser.username)
    var user = r.user
    if(!user){ statusEl.textContent=''; return }
    var online = user.online
    var lastSeen = user.last_seen
    if(online){
      statusEl.innerHTML = '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block"></span>Active now</span>'
    } else if(lastSeen){
      var d = new Date(lastSeen.indexOf('T')>=0?lastSeen:lastSeen+' UTC')
      var diff = Date.now()-d.getTime()
      var txt = diff < 60*60*1000 ? Math.floor(diff/60000)+'m ago'
              : diff < 24*60*60*1000 ? Math.floor(diff/3600000)+'h ago'
              : 'Last seen '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'})
      statusEl.textContent = txt
    } else {
      statusEl.textContent = 'Offline'
    }
  }catch(e){ var s=document.getElementById('dm-online-status'); if(s) s.textContent='' }
}

async function dmRefreshChat(scrollToBottom){
  if(!currentDMUser) return
  var msgs = []
  try{ var r = await GET('/messages/'+currentDMUser.id); msgs = r.messages||[]; loadMsgBadge() }catch(e){}
  var msgsEl = document.getElementById('dm-msgs')
  if(!msgsEl) return
  if(msgs.length === 0){
    msgsEl.innerHTML = '<div class="dm-empty"><div style="font-size:32px">👋</div><div style="font-size:13px">No messages yet. Say hello!</div></div>'
    return
  }
  var html = '', lastDate = ''
  msgs.forEach(function(m){
    var d = new Date(m.created_at.indexOf('T')>=0||m.created_at.indexOf('Z')>=0?m.created_at:m.created_at+' UTC')
    var dateStr = d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})
    if(dateStr !== lastDate){
      html += '<div class="dm-date-sep">'+dateStr+'</div>'
      lastDate = dateStr
    }
    html += dmMsgHtml(m)
  })
  msgsEl.innerHTML = html
  if(scrollToBottom) setTimeout(function(){ msgsEl.scrollTop = msgsEl.scrollHeight }, 50)
}

async function dmSend(){
  if(!currentDMUser) return
  var inp = document.getElementById('dm-input')
  var body = inp ? inp.value.trim() : ''
  var media = dmPendingMedia
  if(!body && !media) return

  // Check if there's a link preview showing - capture its URL
  var linkPreviewUrl = null
  var pa = document.getElementById('dm-preview-area')
  if(pa && pa.children.length > 0 && !media){
    var cardEl = pa.querySelector('[data-url]')
    if(cardEl) linkPreviewUrl = cardEl.dataset.url
  }

  if(inp){ inp.value = ''; inp.style.height = 'auto' }
  dmClearMedia()
  // Clear preview area
  if(pa){ pa.innerHTML = ''; pa.style.display = 'none' }

  try{
    var payload = {body: body||''}
    if(media){
      payload.media_url = media.url
      payload.media_type = media.type
    } else if(linkPreviewUrl){
      // Send link preview metadata alongside the message
      var cached = dmLinkCache[linkPreviewUrl]
      if(cached){
        payload.media_url = linkPreviewUrl
        payload.media_type = 'link'
        payload.link_title = cached.title || ''
        payload.link_image = cached.image || ''
        payload.link_desc = cached.description || ''
      }
    }
    await apiFetch('/messages/'+currentDMUser.id, {method:'POST', body:JSON.stringify(payload)})
    await dmRefreshChat(true)
    // Refresh convo list to update preview
    var r = await GET('/messages')
    var listEl = document.getElementById('dm-list')
    if(listEl && r.conversations){
      listEl.innerHTML = r.conversations.map(function(c){
        var online = c.last_seen && (Date.now()-new Date(c.last_seen.indexOf('T')>=0?c.last_seen:c.last_seen.replace(' ','T')+'Z').getTime()) < 5*60*1000
        var isActive = currentDMUser && c.id === currentDMUser.id
        return dmConvoItemHtml(c, online, isActive)
      }).join('')
    }
  } catch(e){ toast(e.message,'er'); if(inp){ inp.value=body } }
}

function dmConvoItemHtml(c, online, isActive){
  return '<div class="dm-item'+(isActive?' active':'')+'" data-uid="'+esc(c.id)+'" data-uname="'+esc(c.username)+'" data-avatar="'+esc(c.avatar_url||'')+'" onclick="dmSelectBtn(this)">'
    + avHtml(c.username, 42, c.avatar_url)
    + '<div style="flex:1;min-width:0">'
    + '<div class="dm-item-name">'+esc(c.username)
    + '<div class="'+(online?'online-dot':'offline-dot')+'" style="width:7px;height:7px;border-width:1px"></div></div>'
    + '<div class="dm-item-preview">'+esc((c.last_message||'').slice(0,38))+'</div></div>'
    + (c.unread>0?'<div class="dm-item-unread">'+c.unread+'</div>':'')

var notifOpen=false,notifData=[],unreadCount=0
async function loadNotifs(){
  if(!S.user)return
  try{var r=await GET('/notifications');notifData=r.notifications||[];unreadCount=r.unread||0;updateBadge()}catch(e){}
}
function toggleNotifs(){notifOpen?closeNotifs():openNotifs()}
function openNotifs(){
  var dd=document.getElementById('notif-dd');if(dd){closeNotifs();return}
  var el=document.createElement('div');el.className='notif-dropdown show';el.id='notif-dd'
  el.innerHTML=buildNotifHtml();document.body.appendChild(el);notifOpen=true
  unreadCount=0;updateBadge();POST('/notifications/read').catch(function(){})
  setTimeout(function(){document.addEventListener('click',closeNotifsOutside)},100)
}
function closeNotifsOutside(e){var dd=document.getElementById('notif-dd');var bell=document.getElementById('notif-bell');if(dd&&!dd.contains(e.target)&&bell&&!bell.contains(e.target))closeNotifs()}
function closeNotifs(){var dd=document.getElementById('notif-dd');if(dd)dd.remove();notifOpen=false;document.removeEventListener('click',closeNotifsOutside)}
function goNotifIdx(el){
  var idx=parseInt(el.dataset.nidx)
  var n=notifData[idx]
  if(n) goNotif(n)
}
function goNotif(n){
  closeNotifs()
  if(n.type==='message') go('messages',{uid:n.actor_id,uname:n.actor_username})
  else if(n.type==='follow') go('profile',{username:n.actor_username})
  else if(n.thread_id) go('thread',{id:n.thread_id})
}
function buildNotifHtml(){
  var icons={like:'👍',comment:'💬',reply:'↩️',mention:'@',follow:'👤',message:'✉️'}
  function notifMsg(n){
    var actor='<strong>u/'+esc(n.actor_username)+'</strong>'
    var title=esc((n.thread_title||'').slice(0,40))
    if(n.type==='like') return actor+' liked your post <em>'+title+'</em>'
    if(n.type==='comment') return actor+' commented on <em>'+title+'</em>'
    if(n.type==='reply') return actor+' replied to your comment on <em>'+title+'</em>'
    if(n.type==='follow') return actor+' started following you'
    if(n.type==='message') return actor+' sent you a message'
    return 'New notification from '+actor
  }
  var items=notifData.length===0?'<div class="notif-empty">🔔 No notifications yet</div>'
    :notifData.map(function(n,nidx){
      var unreadCls=n.is_read?'':' unread'
      var icon=icons[n.type]||'🔔'
      var dot=n.is_read?'':'<div class="notif-dot"></div>'
      var html='<div class="notif-item'+unreadCls+'" data-nidx="'+nidx+'" onclick="goNotifIdx(this)">'
      html+='<div style="font-size:18px;flex-shrink:0">'+icon+'</div>'
      html+='<div class="flex1"><div class="notif-msg">'+notifMsg(n)+'</div><div class="notif-time">'+ago(n.created_at)+'</div></div>'+dot+'</div>'
      return html
    }).join('')
  return '<div class="notif-hd"><span>🔔 Notifications</span><button class="btn btn-ghost btn-sm" onclick="markAllRead()">Mark all read</button></div><div class="notif-list">'+items+'</div>'
}
function markAllRead(){
  POST('/notifications/read').then(function(){notifData=notifData.map(function(n){n.is_read=1;return n});var dd=document.getElementById('notif-dd');if(dd){var list=dd.querySelector('.notif-list');if(list)list.innerHTML=buildNotifHtml().split('notif-list">')[1].replace('</div>','')}var el=document.getElementById('notif-count');if(el)el.style.display='none';unreadCount=0}).catch(function(){})
}
function startNotifPolling(){
  if(!S.user)return
  loadNotifs();loadMsgBadge();startPing()
  setInterval(loadNotifs,30000);setInterval(loadMsgBadge,15000)
}

function regCodeInput(el, idx){
  var val=el.value.replace(/[^0-9]/g,''); el.value=val.slice(-1)

function getRegCode(){
  var code=''
  for(var i=0;i<6;i++){ var el=document.getElementById('rci'+i); code+=(el&&el.value)||'' }

// ── DM MEDIA & LINK PREVIEW ──────────────────────────────
var dmPendingMedia = null
var dmLinkTimer = null
var dmLinkCache = {}

function dmAttachBtn(el){ dmAttachFile(el.dataset.type) }
function dmOpenUrl(el){ window.open(el.dataset.url, '_blank') }

function dmToggleAttach(e){
  e.stopPropagation()
  var menu = document.getElementById('dm-attach-menu')
  if(!menu) return
  var open = menu.style.display !== 'none'
  menu.style.display = open ? 'none' : 'flex'
  if(!open){
    setTimeout(function(){
      document.addEventListener('click', function close(){
        var m = document.getElementById('dm-attach-menu')
        if(m) m.style.display = 'none'
        document.removeEventListener('click', close)
      })
    }, 50)
  }
}

function dmAttachFile(type){
  // Close menu
  var menu = document.getElementById('dm-attach-menu')
  if(menu) menu.style.display = 'none'
  // Always create a fresh input - innerHTML-created inputs don't fire in browsers
  var old = document.getElementById('dm-file-input')
  if(old) old.remove()
  var inp = document.createElement('input')
  inp.type = 'file'
  inp.id = 'dm-file-input'
  inp.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0'
  if(type === 'image') inp.accept = 'image/*,.gif'
  else inp.accept = 'audio/*,.mp3,.wav,.ogg,.m4a,.aac,.flac'
  inp.onchange = function(){ dmHandleFile(this) }
  document.body.appendChild(inp)
  setTimeout(function(){ inp.click() }, 50)
}

async function dmHandleFile(inp){
  var file = inp.files && inp.files[0]
  if(inp.parentNode) inp.parentNode.removeChild(inp)
  if(!file){ return }
  var isImage = file.type.startsWith('image/')
  var isAudio = file.type.startsWith('audio/')
  if(!isImage && !isAudio){ toast('Only images and audio are allowed', 'er'); return }
  if(file.size > 25*1024*1024){ toast('File too large (max 25MB)', 'er'); return }

  dmPendingMedia = null
  var previewUrl = URL.createObjectURL(file)
  var pa = document.getElementById('dm-preview-area')
  if(pa){
    pa.style.display = 'block'
    var thumb = isImage
      ? '<img style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0" src="'+previewUrl+'"/>'
      : '<div style="width:56px;height:56px;border-radius:8px;background:var(--glass2);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">🎵</div>'
    pa.innerHTML = '<div style="padding:10px 14px;border-top:1px solid var(--border)">'
      + '<div style="display:flex;align-items:center;gap:10px;background:var(--glass);border-radius:var(--r-lg);padding:8px 10px;position:relative">'
      + thumb
      + '<div style="flex:1;min-width:0">'
      + '<div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(file.name)+'</div>'
      + '<div style="font-size:11px;color:var(--txt3)" id="dm-upload-status">Uploading…</div>'
      + '</div>'
      + '<button onclick="dmClearMedia()" style="background:var(--red);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0">✕</button>'
      + '</div></div>'
  }

  try {
    var fd = new FormData()
    fd.append('file', file)
    var res = await fetch(API + '/upload', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + S.token },
      body: fd
    })
    var data = await res.json()
    if(!res.ok) throw new Error(data.error || 'Upload failed')
    dmPendingMedia = { url: data.url, type: data.media_type || (isImage ? 'image' : 'audio') }
    var statusEl = document.getElementById('dm-upload-status')
    if(statusEl) statusEl.textContent = 'Ready · ' + (file.size/1024).toFixed(0) + 'KB'
    toast('Ready to send 📎', 'info')
  } catch(e) {
    toast('Upload failed: ' + e.message, 'er')
    dmClearMedia()
  }
}

function dmClearMedia(){
  dmPendingMedia = null
  var pa = document.getElementById('dm-preview-area')
  if(pa){ pa.innerHTML = ''; pa.style.display = 'none' }
}

// Link preview detection
function dmDetectLink(ta){
  if(dmPendingMedia) return
  clearTimeout(dmLinkTimer)
  var text = ta.value
  var match = text.match(/https?:\/\/[^\s]+/)
  if(!match){
    var pa = document.getElementById('dm-preview-area')
    if(pa && !dmPendingMedia){ pa.innerHTML = ''; pa.style.display = 'none' }
    return
  }
  var url = match[0].replace(/[.,;!?]+$/, '') // strip trailing punctuation
  dmLinkTimer = setTimeout(function(){ dmShowLinkPreview(url) }, 700)
}

async function dmShowLinkPreview(url){
  if(dmPendingMedia) return
  var pa = document.getElementById('dm-preview-area')
  if(!pa) return
  // Show loading
  pa.style.display = 'block'
  pa.innerHTML = '<div style="padding:10px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--txt3);display:flex;align-items:center;gap:8px">'
    + '<span style="display:inline-block;animation:spin 1s linear infinite">⟳</span> Fetching preview…</div>'
  try {
    var data = dmLinkCache[url] || (await GET('/link-preview?url=' + encodeURIComponent(url)))
    dmLinkCache[url] = data
    // Show preview even if only URL is available
    renderDmLinkPreview(data || {}, url)
  } catch(e){
    // Still show a basic URL card on error
    renderDmLinkPreview({}, url)
  }
}

function renderDmLinkPreview(data, url){
  var pa = document.getElementById('dm-preview-area')
  if(!pa) return
  try{ var host = new URL(url).hostname } catch(e){ var host = url }
  if(!data) data = {}
  pa.style.display = 'block'
  pa.innerHTML = ''
  var wrap = document.createElement('div')
  wrap.style.cssText = 'padding:10px 14px;border-top:1px solid var(--border);position:relative'
  var card = document.createElement('div')

function dmMsgHtml(m){
  var isMine = m.sender_id === S.user.id
  var side = isMine ? 'mine' : 'theirs'
  var d = new Date(m.created_at.indexOf('T')>=0||m.created_at.indexOf('Z')>=0?m.created_at:m.created_at+' UTC')
  var timeStr = d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
  var linkColor = isMine ? 'rgba(255,255,255,.85)' : 'var(--accent3)'
  var borderColor = isMine ? 'rgba(255,255,255,.2)' : 'var(--border2)'

  // Text body with clickable URLs
  var bodyHtml = ''
  if(m.body){
    bodyHtml = '<div style="white-space:pre-wrap;word-break:break-word">'+esc(m.body).replace(/(https?:\/\/[^\s]+)/g, function(url){
      return '<a href="'+esc(url)+'" target="_blank" rel="noopener" style="color:'+linkColor+';text-decoration:underline">'+esc(url)+'</a>'
    })+'</div>'
  }

  // Media
  var mediaHtml = ''
  if(m.media_url){
    var mt = m.media_type
    if(mt === 'image' || mt === 'gif'){
      mediaHtml = '<img src="'+esc(m.media_url)+'" data-src="'+esc(m.media_url)+'"'
        +' onclick="openLightbox(this.dataset.src)"'
        +' style="max-width:100%;max-height:260px;border-radius:10px;display:block;cursor:zoom-in;margin-top:'+(m.body?'6':'0')+'px"'
        +' loading="lazy"/>'
    } else if(mt === 'audio'){
      mediaHtml = '<audio controls src="'+esc(m.media_url)+'"'
        +' style="width:220px;margin-top:'+(m.body?'6':'0')+'px;border-radius:8px;outline:none"></audio>'
    } else if(mt === 'link'){
      // Rich link preview card
      var host = ''
      try{ host = new URL(m.media_url).hostname }catch(e){}
      mediaHtml = '<div data-url="'+esc(m.media_url)+'" onclick="dmOpenUrl(this)" style="margin-top:'+(m.body?'8':'0')+'px;border:1px solid '+borderColor+';border-radius:12px;overflow:hidden;cursor:pointer;background:rgba(0,0,0,.15)">'

        +(m.link_image
          ? '<div style="width:100%;max-height:180px;overflow:hidden;background:rgba(0,0,0,.2)">'
            +'<img src="'+esc(m.link_image)+'" style="width:100%;object-fit:cover;max-height:180px" onerror="this.parentElement.hidden=true"/></div>'
          : '')
        +'<div style="padding:10px 12px">'
        +'<div style="font-size:10px;opacity:.6;margin-bottom:3px">🔗 '+esc(host)+'</div>'
        +'<div style="font-size:13px;font-weight:600;line-height:1.4">'+esc((m.link_title||m.media_url).slice(0,80))+'</div>'
        +(m.link_desc ? '<div style="font-size:11px;opacity:.7;margin-top:3px">'+esc(m.link_desc.slice(0,100))+'</div>' : '')
        +'</div></div>'
    }
  }

  // Read receipt ticks
  var tickHtml = ''
  if(isMine){
    var seen = m.seen_at
    if(seen){
      var seenDate = new Date(seen.indexOf('T')>=0 ? seen : seen+' UTC')
      var seenTime = seenDate.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
      tickHtml = '<div class="dm-seen">'
        + '<span class="dm-tick seen" title="Seen at '+seenTime+'">'
        + '<svg width="16" height="10" viewBox="0 0 16 10" fill="none">'
        + '<path d="M1 5l3 3 5-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
        + '<path d="M6 5l3 3 5-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
        + '</svg></span></div>'
    } else {
      tickHtml = '<div class="dm-seen">'
        + '<span class="dm-tick" title="Sent">'
        + '<svg width="12" height="10" viewBox="0 0 12 10" fill="none">'
        + '<path d="M1 5l3 3 5-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
        + '</svg></span></div>'
    }
  }
  return '<div style="display:flex;flex-direction:column">'
    + '<div style="display:flex;justify-content:'+(isMine?'flex-end':'flex-start')+';margin-bottom:1px">'
    + '<div class="chat-msg '+side+'" style="max-width:'+(m.media_type==='link'?'85':'72')+'%">'
    + bodyHtml + mediaHtml
    + '<div class="chat-msg-time">'+timeStr+'</div>'
    + '</div></div>'
    + tickHtml
    + '</div>'
}
