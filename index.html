async function catUploadAvatar(slug) {
  if(catUploadInProgress) return
  var inp = document.createElement('input')
  inp.type = 'file'; inp.accept = 'image/*'
  inp.style.cssText = 'position:fixed;top:-9999px'
  inp.onchange = async function() {
    var file = inp.files && inp.files[0]
    inp.remove()
    if(!file) return
    if(file.size > 10*1024*1024) { toast('Image too large (max 10MB)', 'er'); return }
    catUploadInProgress = true
    toast('Uploading community picture…', 'info')
    try {
      var fd = new FormData(); fd.append('file', file)
      var res = await fetch(API+'/upload', {method:'POST', headers:{Authorization:'Bearer '+S.token}, body:fd})
      var data = await res.json()
      if(!res.ok) throw new Error(data.error||'Upload failed')
      await apiFetch('/categories/'+slug+'/settings', {method:'PATCH', body:JSON.stringify({image_url: data.url})})
      toast('Community picture updated! 🎉')
      // Update avatar in page
      var avEl = document.querySelector('.cat-avatar')
      if(avEl) avEl.innerHTML = '<img src="'+esc(data.url)+'" alt="icon"/>'
    } catch(e) { toast('Failed: '+e.message, 'er') }
    finally { catUploadInProgress = false }
  }
  document.body.appendChild(inp)
  setTimeout(function(){ inp.click() }, 50)
}

async function catUploadCover(slug) {
  if(catUploadInProgress) return
  var inp = document.createElement('input')
  inp.type = 'file'; inp.accept = 'image/*'
  inp.style.cssText = 'position:fixed;top:-9999px'
  inp.onchange = async function() {
    var file = inp.files && inp.files[0]
    inp.remove()

    if(file.size > 20*1024*1024) { toast('Image too large (max 20MB)', 'er'); return }

      await apiFetch('/categories/'+slug+'/settings', {method:'PATCH', body:JSON.stringify({cover_url: data.url})})

function initGoogleSignIn(containerId){
  if(!GOOGLE_CLIENT_ID){
    var el = document.getElementById(containerId)
    if(el) el.innerHTML = '<div style="text-align:center;font-size:11px;color:var(--txt3);padding:10px;border:1px dashed var(--border2);border-radius:var(--r-lg)">Google Sign-In not configured yet</div>'
    return
  }
  if(typeof google === 'undefined' || !google.accounts){
    // Google script not loaded yet - retry shortly
    setTimeout(function(){ initGoogleSignIn(containerId) }, 300)
    return
  }
  try{
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleGoogleCredential,
      auto_select: false
    })
    var el = document.getElementById(containerId)
    if(el){
      google.accounts.id.renderButton(el, {
        theme: 'outline',
        size: 'large',
        width: 320,
        text: 'continue_with',
        shape: 'pill'
      })
    }
  }catch(e){ console.error('Google Sign-In init failed:', e) }
}

async function handleGoogleCredential(response){
  if(!response || !response.credential){ toast('Google Sign-In failed','er'); return }
  try{
    var r = await POST('/auth/google', {credential: response.credential})
    setAuth(r.token, r.user)
    toast('Welcome, '+r.user.username+'! 🎉')
    go('home')
  }catch(e){
    toast(e.message||'Google Sign-In failed','er')
  }
}

function rteEditorHtml(editorId, placeholder, initialHtml){
  return '<div class="rte-wrap">'
    + rteToolbarHtml(editorId)
    + '<div class="rte-editor" id="'+editorId+'" contenteditable="true" data-placeholder="'+esc(placeholder||'Start writing…')+'">'+(initialHtml||'')+'</div>'
    + '<textarea class="rte-html-editor" id="'+editorId+'-html" style="display:none" spellcheck="false" onkeydown="rteHtmlTabKey(event,this)"></textarea>'
    + '</div>'
}

function rteHtmlTabKey(e, el){
  if(e.key === 'Tab'){
    e.preventDefault()
    var start = el.selectionStart, end = el.selectionEnd
    el.value = el.value.substring(0,start) + '  ' + el.value.substring(end)
    el.selectionStart = el.selectionEnd = start + 2
  }
}

function rteCmd(editorId, cmd, val){
  var ed = document.getElementById(editorId)
  if(ed) ed.focus()
  document.execCommand(cmd, false, val||null)
}

function rteBlockFormat(editorId, tag){
  var ed = document.getElementById(editorId)
  if(ed) ed.focus()
  document.execCommand('formatBlock', false, tag)
}

function rteLink(editorId){
  var url = prompt('Enter the link URL (https://...)')
  if(!url) return
  var ed = document.getElementById(editorId)
  if(ed) ed.focus()
  document.execCommand('createLink', false, url)
}

function rteImage(editorId){
  var url = prompt('Enter the image URL (https://...)')
  if(!url) return
  var ed = document.getElementById(editorId)
  if(ed) ed.focus()
  document.execCommand('insertImage', false, url)
}

function rteTable(editorId){
  var rows = parseInt(prompt('How many rows?', '3')) || 3
  var cols = parseInt(prompt('How many columns?', '3')) || 3
  rows = Math.min(Math.max(rows,1),20)
  cols = Math.min(Math.max(cols,1),10)
  var html = '<table><thead><tr>'
  for(var c=0;c<cols;c++) html += '<th>Header '+(c+1)+'</th>'
  html += '</tr></thead><tbody>'
  for(var r=0;r<rows;r++){
    html += '<tr>'
    for(var c2=0;c2<cols;c2++) html += '<td>Cell</td>'
    html += '</tr>'
  }
  html += '</tbody></table><p><br></p>'
  var ed = document.getElementById(editorId)
  if(ed) ed.focus()
  document.execCommand('insertHTML', false, html)
}

function rteSwitchMode(editorId, mode){
  var visualEl = document.getElementById(editorId)
  var htmlEl = document.getElementById(editorId+'-html')
  var btnVisual = document.getElementById(editorId+'-mode-visual')
  var btnHtml = document.getElementById(editorId+'-mode-html')
  if(!visualEl || !htmlEl) return
  if(mode === 'html'){
    htmlEl.value = visualEl.innerHTML.trim()
    visualEl.style.display = 'none'
    htmlEl.style.display = 'block'
    btnVisual.classList.remove('active')
    btnHtml.classList.add('active')
  } else {
    visualEl.innerHTML = htmlEl.value
    visualEl.style.display = 'block'
    htmlEl.style.display = 'none'
    btnHtml.classList.remove('active')
    btnVisual.classList.add('active')
  }
}

function rteGetContent(editorId){
  var visualEl = document.getElementById(editorId)
  var htmlEl = document.getElementById(editorId+'-html')
  // Whichever mode is currently visible holds the latest edits
  if(htmlEl && htmlEl.style.display === 'block') return htmlEl.value.trim()
  return visualEl ? visualEl.innerHTML.trim() : ''
}

  var catSelect=(document.getElementById('bf-category')||{}).value||'news'
  var catCustom=(document.getElementById('bf-category-custom')||{}).value||''
  var category = catSelect==='__custom__' ? catCustom.trim().toLowerCase().replace(/[^a-z0-9-]/g,'-') : catSelect
  if(!category) category='news'
  var tagsRaw=(document.getElementById('bf-tags')||{}).value||''
  var bodyHtml = rteGetContent('bf-body-rte')
  var reqMinRaw=(document.getElementById('bf-reqmin')||{}).value||''
  var reqRecRaw=(document.getElementById('bf-reqrec')||{}).value||''
  var dlLinksRaw=(document.getElementById('bf-dllinks')||{}).value||''
  var errEl=document.getElementById('bf-err')
  errEl.style.display='none'

  if(!title.trim()){ errEl.textContent='Title is required'; errEl.style.display='block'; return }

  var tags = tagsRaw.split(',').map(function(t){return t.trim()}).filter(Boolean)
  var reqMin = reqMinRaw.split('\n').map(function(s){return s.trim()}).filter(Boolean)
  var reqRec = reqRecRaw.split('\n').map(function(s){return s.trim()}).filter(Boolean)
  var dlLinks = dlLinksRaw.split('\n').map(function(line){
    var parts = line.split('|')
    if(parts.length < 2) return null
    var label = parts[0].trim()
    var url = parts.slice(1).join('|').trim()
    if(!url) return null
    return { label: label||'Download', url: url }
  }).filter(Boolean)

  var payload = {
    title: title.trim(), description: desc.trim(), image_url: image.trim()||null,
    category: category, tags: tags, body: bodyHtml,
    requirements: { minimum: reqMin, recommended: reqRec },
    download_links: dlLinks
  }

  try{
    if(editingBlogId){
      await apiFetch('/admin/blog/'+editingBlogId, {method:'PATCH', body:JSON.stringify(payload)})
      toast('Post updated! 🎉')
    } else {
      await apiFetch('/admin/blog', {method:'POST', body:JSON.stringify(payload)})
      toast('Post published! 🎉')
    }
    go('blog')
  }catch(e){ errEl.textContent=e.message; errEl.style.display='block' }
}

async function deleteBlogPostBtn(btn){
  var id=btn.dataset.id, title=btn.dataset.title
  if(!confirm('Delete "'+title+'"? This cannot be undone.')) return
  try{
    await apiFetch('/admin/blog/'+id, {method:'DELETE'})
    toast('Post deleted')
    go('blog')
  }catch(e){ toast(e.message,'er') }
}

function blogShareLink(){
  if(navigator.clipboard) navigator.clipboard.writeText(window.location.href)
  toast('Link copied! 🔗')
}

    + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'
    + 'Scanned for viruses — 100% safe</div>'
    + '</div></div>'
}

function blogStartCountdown(links){
  var n = 6
  var cdEl = document.getElementById('blog-countdown')
  var timer = setInterval(function(){
    n--
    if(cdEl) cdEl.textContent = n
    if(n <= 0){
      clearInterval(timer)
      var box = document.getElementById('blog-dl-box')
      var cdWrap = box ? box.querySelector('div') : null
      if(cdEl) cdEl.style.display = 'none'
      var labelEl = box ? box.firstElementChild : null
      if(labelEl) labelEl.style.display = 'none'
      var linksWrap = document.getElementById('blog-dl-links')
      var linksInner = document.getElementById('blog-dl-links-inner')
      if(linksWrap) linksWrap.style.display = 'block'
      if(linksInner){
        linksInner.innerHTML = links.map(function(l){
          return '<a class="btn btn-grad" href="'+esc(l.url)+'" target="_blank" rel="noopener noreferrer" style="justify-content:center"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'+esc(l.label||'Download')+'</a>'
        }).join('')
      }
    }
  }, 1000)
}


restoreFromUrl()
startNotifPolling()
if(S.user) loadUserVotes()
if(S.page==='home') go('home')
else render()
// Show community guidelines consent on first visit
setTimeout(checkConsent, 800)
